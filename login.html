<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Metadatos: orientan al navegador, a los buscadores (SEO) y a redes sociales al compartir el enlace. -->

  <!-- charset: codificación de caracteres (tildes, ñ, símbolos). -->
  <meta charset="UTF-8">
  <!-- viewport: ancho inicial en móviles; evita que la página se vea “miniatura” sin zoom. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- title: texto de la pestaña y título principal en resultados de búsqueda. -->
  <title>Login - Booknest</title>

  <!-- description: texto resumido que suelen mostrar Google y otros buscadores bajo el título. -->
  <meta name="description" content="Inicia sesión en Booknest para acceder a tu biblioteca, reservas y catálogo de libros.">
  <!-- keywords: palabras clave del tema (hoy tienen poco peso en el ranking, sirven como documentación). -->
  <meta name="keywords" content="Booknest, libros, biblioteca, login, iniciar sesión">
  <!-- author: indica autoría o proyecto dueño del contenido. -->
  <meta name="author" content="Booknest">
  <!-- robots: permite (index, follow) o bloquea (noindex, nofollow) indexar y seguir enlaces. -->
  <meta name="robots" content="index, follow">
  <!-- theme-color: color de la barra de interfaz del navegador en algunos móviles. -->
  <meta name="theme-color" content="#1f2937">

  <!-- Open Graph (og:*): título, tipo e idioma para vista previa en WhatsApp, Facebook, LinkedIn, etc. -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_ES">
  <meta property="og:title" content="Login - Booknest">
  <meta property="og:description" content="Inicia sesión en Booknest para acceder a tu biblioteca y catálogo.">

  <!-- Twitter Card: formato y textos al compartir en X/Twitter (summary = tarjeta compacta con texto). -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Login - Booknest">
  <meta name="twitter:description" content="Inicia sesión en Booknest para acceder a tu biblioteca y catálogo.">

  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <form onsubmit="return login()">
      <label for="email">Correo:</label>
      <input type="email" id="email" required>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" required>

      <button type="submit">Entrar</button>
    </form>

    <p>¿No tienes cuenta? <a href="register.html">Crear cuenta</a></p>
  </div>

  <script>
    // Si ya hay sesión activa, redirigir directamente
    (function() {
      const rol = localStorage.getItem("rol");
      if (rol === "admin") { window.location.href = "admin.html"; return; }
      if (rol === "cliente") { window.location.href = "cliente.html"; return; }
    })();

    const adminUser = { email: "admin@booknest.com", password: "1234" };

    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Por favor completa todos los campos.");
        return false;
      }

      // Verificar administrador
      if (email === adminUser.email && password === adminUser.password) {
        localStorage.setItem("rol", "admin");
        alert("Bienvenido, administrador.");
        window.location.href = "admin.html";
        return false;
      }

      // Buscar usuario registrado
      const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
      const usuario = usuarios.find(u => u.correo === email && u.password === password);

      if (usuario) {
        // Guardar sesión del usuario activo
        localStorage.setItem("usuarioActivo", JSON.stringify(usuario));
        // Carrito e historial con clave única por usuario (evita mezclar entre cuentas)
        localStorage.setItem("rol", "cliente");
        alert(`Bienvenido, ${usuario.nombre}`);
        window.location.href = "cliente.html";
      } else {
        alert("Correo o contraseña incorrectos. Verifica tus datos.");
      }

      return false;
    }
  </script>

</body>
</html>
