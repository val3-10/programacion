<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Booknest</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <form onsubmit="return login()">
      <label for="email">Correo:</label>
      <input type="email" id="email" required>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" required>

      <button type="submit">Entrar</button>
    </form>

    <p>¿No tienes cuenta? <a href="register.html">Crear cuenta</a></p>
  </div>

  <script>
    // Si ya hay sesión activa, redirigir directamente
    (function() {
      const rol = localStorage.getItem("rol");
      if (rol === "admin") { window.location.href = "admin.html"; return; }
      if (rol === "cliente") { window.location.href = "cliente.html"; return; }
    })();

    const adminUser = { email: "admin@booknest.com", password: "1234" };

    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Por favor completa todos los campos.");
        return false;
      }

      // Verificar administrador
      if (email === adminUser.email && password === adminUser.password) {
        localStorage.setItem("rol", "admin");
        alert("Bienvenido, administrador.");
        window.location.href = "admin.html";
        return false;
      }

      // Buscar usuario registrado
      const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
      const usuario = usuarios.find(u => u.correo === email && u.password === password);

      if (usuario) {
        // Guardar sesión del usuario activo
        localStorage.setItem("usuarioActivo", JSON.stringify(usuario));
        // Carrito e historial con clave única por usuario (evita mezclar entre cuentas)
        localStorage.setItem("rol", "cliente");
        alert(`Bienvenido, ${usuario.nombre}`);
        window.location.href = "cliente.html";
      } else {
        alert("Correo o contraseña incorrectos. Verifica tus datos.");
      }

      return false;
    }
  </script>

</body>
</html>
