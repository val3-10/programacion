<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Metadatos: orientan al navegador, a los buscadores (SEO) y a redes sociales al compartir el enlace. -->

  <!-- charset: codificación de caracteres (tildes, ñ, símbolos). -->
  <meta charset="UTF-8">
  <!-- viewport: ancho inicial en móviles; evita que la página se vea “miniatura” sin zoom. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- title: texto de la pestaña y título principal en resultados de búsqueda. -->
  <title>Booknest - Administrador</title>

  <!-- description: texto resumido que suelen mostrar Google y otros buscadores bajo el título. -->
  <meta name="description" content="Panel de administración de Booknest: gestión de libros, usuarios e inventario.">
  <!-- keywords: palabras clave del tema (hoy tienen poco peso en el ranking, sirven como documentación). -->
  <meta name="keywords" content="Booknest, administración, gestión de libros, biblioteca">
  <!-- author: indica autoría o proyecto dueño del contenido. -->
  <meta name="author" content="Booknest">
  <!-- robots: aquí noindex/nofollow pide no indexar el panel ni seguir enlaces (menos exposición en buscadores). -->
  <meta name="robots" content="noindex, nofollow">
  <!-- theme-color: color de la barra de interfaz del navegador en algunos móviles. -->
  <meta name="theme-color" content="#1f2937">

  <!-- Open Graph (og:*): título, tipo e idioma para vista previa en WhatsApp, Facebook, LinkedIn, etc. -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_ES">
  <meta property="og:title" content="Booknest - Administración">
  <meta property="og:description" content="Panel interno para administrar el catálogo y los datos de Booknest.">

  <!-- Twitter Card: formato y textos al compartir en X/Twitter (summary = tarjeta compacta con texto). -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Booknest - Administración">
  <meta name="twitter:description" content="Panel interno para administrar el catálogo y los datos de Booknest.">

  <link rel="stylesheet" href="styles.css">

   <style>
    #previewCaratula {
      max-width: 100px;
      margin-top: 10px;
      display: none;
    }
    table img { width: 50px; height: auto; }
    .toast-success { background: #4caf50; color: #fff; padding: 10px; position: fixed; top: 10px; right: 10px; border-radius: 5px; z-index: 9999;}
    .toast-error   { background: #f44336; color: #fff; padding: 10px; position: fixed; top: 10px; right: 10px; border-radius: 5px; z-index: 9999;}
    .toast-info    { background: #2196f3; color: #fff; padding: 10px; position: fixed; top: 10px; right: 10px; border-radius: 5px; z-index: 9999;}
  </style>
</head>

<body>

<!-- GUARD: bloquear acceso sin rol admin -->
<script>
  (function() {
    const rol = localStorage.getItem("rol");
    if (rol !== "admin") {
      alert("Acceso restringido. Debes iniciar sesión como administrador.");
      window.location.href = "login.html";
    }
  })();
</script>

<header>
  <div class="header-container">
    <button onclick="cerrarSesion()" class="btn-cerrar">Cerrar Sesión</button>
  </div>
</header>

<div class="container">
  <div class="menu-opciones">
    <button onclick="mostrarSeccion('libros')">Registrar Libro</button>
    <button onclick="mostrarSeccion('ventas')">Registro de Ventas</button>
    <button onclick="mostrarSeccion('prestamos')">Registro de Préstamos</button>
    <button onclick="mostrarSeccion('proveedores')">Proveedores</button>
  </div>

  <!-- SECCIÓN: REGISTRO DE LIBROS -->
  <div id="libros" class="seccion">
    <h2>Registrar Libro</h2>
    <input type="text" id="titulo" placeholder="Título">
    <input type="text" id="autor" placeholder="Autor">
    <select id="estado">
      <option value="disponible">Disponible</option>
      <option value="venta">En venta</option>
      <option value="prestamo">En préstamo</option>
    </select>
    <input type="number" id="stock" placeholder="Stock" min="0">
    <input type="number" id="precio" placeholder="Precio (en $)" min="0">
    <label for="caratula">Carátula del libro:</label>
    <input type="file" id="caratula" accept="image/*" capture="environment">
    <img id="previewCaratula" alt="Vista previa">
    <button onclick="agregarLibro()">Agregar Libro</button>
    <div class="tabla-responsive">
      <table id="tablaLibrosAdmin">
      <thead>
        <tr>
          <th>Título</th><th>Autor</th><th>Estado</th>
          <th>Stock</th><th>Precio</th><th>Carátula</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
      </div>
  </div>

  <!-- SECCIÓN: REGISTRO DE VENTAS -->
  <div id="ventas" class="seccion" style="display:none;">
    <h2>Registro de Ventas</h2>
    <div class="tabla-responsive">
      <table id="tablaVentas">
      <thead>
        <tr>
          <th>Fecha</th><th>Cliente</th><th>Libro</th>
          <th>Cantidad</th><th>Precio Total</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
      </div>
  </div>

  <!-- SECCIÓN: REGISTRO DE PRÉSTAMOS -->
  <div id="prestamos" class="seccion" style="display:none;">
    <h2>Registro de Préstamos</h2>
    <div class="tabla-responsive">
      <table id="tablaPrestamos">
      <thead>
        <tr>
          <th>Fecha</th><th>Cliente</th><th>Libro</th>
          <th>Cantidad</th><th>Duración</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
      </div>
  </div>

  <!-- SECCIÓN: PROVEEDORES -->
  <div id="proveedores" class="seccion" style="display:none;">
    <h2>Proveedores</h2>
    <input type="text" id="nombreProveedor" placeholder="Nombre del proveedor">
    <input type="text" id="contactoProveedor" placeholder="Contacto (correo o teléfono)">
    <button onclick="agregarProveedor()">Agregar Proveedor</button>
    <div class="tabla-responsive">
      <table id="tablaProveedores">
      <thead>
        <tr><th>Nombre</th><th>Contacto</th><th>Acciones</th></tr>
      </thead>
      <tbody></tbody>
    </table>
      </div>
  </div>
</div>

<script>
  let libros        = JSON.parse(localStorage.getItem("libros"))        || [];
  let transacciones = JSON.parse(localStorage.getItem("transacciones")) || [];
  let proveedores   = JSON.parse(localStorage.getItem("proveedores"))   || [];

  document.addEventListener("DOMContentLoaded", () => {
    mostrarLibrosAdmin();
    mostrarTransacciones();
    mostrarProveedores();
    mostrarSeccion('libros');
  });

  function cerrarSesion() {
    localStorage.removeItem("rol");
    window.location.href = "login.html";
  }

  function mostrarSeccion(id) {
    document.querySelectorAll(".seccion").forEach(s => s.style.display = "none");
    document.getElementById(id).style.display = "block";
  }

  /* === LIBROS === */
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("caratula").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const preview = document.getElementById("previewCaratula");
          preview.src = ev.target.result;
          preview.style.display = "block";
        };
        reader.readAsDataURL(file);
      }
    });
  });

  function agregarLibro() {
    const caratulaInput = document.getElementById("caratula");
    if (caratulaInput.files.length > 0) {
      const reader = new FileReader();
      reader.onload = function(e) { guardarLibroConCaratula(e.target.result); };
      reader.readAsDataURL(caratulaInput.files[0]);
    } else {
      guardarLibroConCaratula("");
    }
  }

  function guardarLibroConCaratula(caratula) {
    const titulo = document.getElementById("titulo").value.trim();
    const autor  = document.getElementById("autor").value.trim();
    const estado = document.getElementById("estado").value;
    const stock  = parseInt(document.getElementById("stock").value);
    const precio = parseFloat(document.getElementById("precio").value);

    if (!titulo || !autor || isNaN(stock) || stock < 0 || isNaN(precio) || precio < 0) {
      mostrarMensaje('error', 'Complete todos los campos correctamente');
      return;
    }

    apiAddLibro(titulo, autor, estado, stock, precio, caratula);
    mostrarLibrosAdmin();
    mostrarMensaje('success', 'Libro agregado exitosamente');

    document.getElementById("titulo").value  = "";
    document.getElementById("autor").value   = "";
    document.getElementById("stock").value   = "";
    document.getElementById("precio").value  = "";
    document.getElementById("caratula").value = "";
    document.getElementById("previewCaratula").style.display = "none";
  }

  function eliminarLibro(i) {
    if (!confirm('¿Está seguro de eliminar este libro?')) return;
    apiDeleteLibro(i);
    mostrarLibrosAdmin();
    mostrarMensaje('info', 'Libro eliminado exitosamente');
  }

  function mostrarLibrosAdmin() {
    const tbody = document.querySelector("#tablaLibrosAdmin tbody");
    tbody.innerHTML = "";
    libros.forEach((libro, i) => {
      tbody.innerHTML += `
        <tr>
          <td>${libro.titulo}</td>
          <td>${libro.autor}</td>
          <td>${libro.estado}</td>
          <td>${libro.stock}</td>
          <td>$${libro.precio.toFixed(2)}</td>
          <td>${libro.caratula ? `<img src="${libro.caratula}">` : 'Sin imagen'}</td>
          <td><button onclick="eliminarLibro(${i})">Eliminar</button></td>
        </tr>`;
    });
  }

  /* === TRANSACCIONES === */
  function mostrarTransacciones() {
    const ventasBody    = document.querySelector("#tablaVentas tbody");
    const prestamosBody = document.querySelector("#tablaPrestamos tbody");
    ventasBody.innerHTML = "";
    prestamosBody.innerHTML = "";

    transacciones.forEach((t, index) => {
      if (t.tipo === "venta") {
        ventasBody.innerHTML += `
          <tr>
            <td>${t.fecha}</td>
            <td>${t.usuario || 'Cliente desconocido'}</td>
            <td>${t.libro}</td>
            <td>${t.cantidad || 1}</td>
            <td>$${t.precioTotal || 0}</td>
            <td><button onclick="eliminarTransaccion(${index})">Eliminar</button></td>
          </tr>`;
      } else if (t.tipo === "prestamo") {
        prestamosBody.innerHTML += `
          <tr>
            <td>${t.fecha}</td>
            <td>${t.usuario || 'Cliente desconocido'}</td>
            <td>${t.libro}</td>
            <td>${t.cantidad || 1}</td>
            <td>${t.duracion || '-'}</td>
            <td><button onclick="eliminarTransaccion(${index})">Eliminar</button></td>
          </tr>`;
      }
    });
  }

  function eliminarTransaccion(index) {
    if (!confirm("¿Deseas eliminar este registro?")) return;
    apiDeleteTransaccion(index);
    mostrarTransacciones();
    mostrarMensaje("info", "Registro eliminado");
  }

  /* === MENSAJES === */
  function mostrarMensaje(tipo, mensaje) {
    const toast = document.createElement('div');
    toast.className = `toast-${tipo}`;
    toast.textContent = mensaje;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  /* === PROVEEDORES === */
  function agregarProveedor() {
    const nombre   = document.getElementById("nombreProveedor").value.trim();
    const contacto = document.getElementById("contactoProveedor").value.trim();
    if (!nombre || !contacto) {
      mostrarMensaje('error', 'Complete todos los campos de proveedor');
      return;
    }
    apiAddProveedor(nombre, contacto);
    mostrarProveedores();
    mostrarMensaje('success', 'Proveedor agregado correctamente');
    document.getElementById("nombreProveedor").value  = "";
    document.getElementById("contactoProveedor").value = "";
  }

  function eliminarProveedor(i) {
    if (!confirm('¿Desea eliminar este proveedor?')) return;
    apiDeleteProveedor(i);
    mostrarProveedores();
    mostrarMensaje('info', 'Proveedor eliminado');
  }

  function mostrarProveedores() {
    const tbody = document.querySelector("#tablaProveedores tbody");
    tbody.innerHTML = "";
    proveedores.forEach((p, i) => {
      tbody.innerHTML += `
        <tr>
          <td>${p.nombre}</td>
          <td>${p.contacto}</td>
          <td><button onclick="eliminarProveedor(${i})">Eliminar</button></td>
        </tr>`;
    });
  }
</script>

<!-- API LOCAL -->
<script>
  function apiGetLibros() { return libros; }

  function apiAddLibro(titulo, autor, estado, stock, precio, caratula = "") {
    if (!titulo || !autor || stock < 0 || precio < 0) throw new Error("Datos inválidos para el libro");
    const libro = { titulo, autor, estado, stock, precio, caratula };
    libros.push(libro);
    localStorage.setItem("libros", JSON.stringify(libros));
    return libro;
  }

  function apiDeleteLibro(index) {
    if (index < 0 || index >= libros.length) throw new Error("Índice inválido");
    libros.splice(index, 1);
    localStorage.setItem("libros", JSON.stringify(libros));
  }

  function apiGetTransacciones() { return transacciones; }

  function apiAddTransaccion(tipo, usuario, libro, cantidad = 1, precioTotal = 0, duracion = null) {
    const transaccion = { tipo, fecha: new Date().toLocaleDateString(), usuario, libro, cantidad, precioTotal, duracion };
    transacciones.push(transaccion);
    localStorage.setItem("transacciones", JSON.stringify(transacciones));
    return transaccion;
  }

  function apiDeleteTransaccion(index) {
    if (index < 0 || index >= transacciones.length) throw new Error("Índice inválido");
    transacciones.splice(index, 1);
    localStorage.setItem("transacciones", JSON.stringify(transacciones));
  }

  function apiGetProveedores() { return proveedores; }

  function apiAddProveedor(nombre, contacto) {
    if (!nombre || !contacto) throw new Error("Datos inválidos para el proveedor");
    const proveedor = { nombre, contacto };
    proveedores.push(proveedor);
    localStorage.setItem("proveedores", JSON.stringify(proveedores));
    return proveedor;
  }

  function apiDeleteProveedor(index) {
    if (index < 0 || index >= proveedores.length) throw new Error("Índice inválido");
    proveedores.splice(index, 1);
    localStorage.setItem("proveedores", JSON.stringify(proveedores));
  }
</script>

</body>
</html>
